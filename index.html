<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpotSong - Modern Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">
            <img src="logo.png" alt="SpotSong" class="logo">
            <span>SpotSong</span>
        </div>
        <div class="nav-song-info">
            <span id="navSongName" class="now-playing">Select a song...</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">
        <div class="playlist-header">
            <h1><i class="fas fa-music"></i> Best of NCS</h1>
            <p>No Copyright Sounds - Electronic Dance Music</p>
        </div>

        <!-- Song List -->
        <div class="songs-grid" id="songList">
            <!-- Songs will be populated by JavaScript -->
        </div>
    </main>

    <!-- Player Controls -->
    <div class="player">
        <div class="progress-container">
            <span class="current-time">0:00</span>
            <input type="range" id="progressBar" class="progress-bar" min="0" max="100" value="0">
            <span class="duration">0:00</span>
        </div>

        <div class="player-controls">
            <button class="control-btn" id="prevBtn">
                <i class="fas fa-step-backward"></i>
            </button>
            <button class="control-btn play-pause-btn" id="playPauseBtn">
                <i class="fas fa-play"></i>
            </button>
            <button class="control-btn" id="nextBtn">
                <i class="fas fa-step-forward"></i>
            </button>
        </div>

        <div class="now-playing-info">
            <img src="covers/1.jpg" alt="Current Song" id="nowPlayingCover" class="now-playing-cover">
            <div class="song-details">
                <h3 id="currentSongName">On & On</h3>
                <p id="currentArtist">Cartoon, Daniel Levi</p>
            </div>
            <div class="volume-container">
                <i class="fas fa-volume-up"></i>
                <input type="range" id="volumeSlider" min="0" max="100" value="70">
            </div>
        </div>
    </div>

    <!-- Visualizer -->
    <div class="visualizer" id="visualizer"></div>

    <script src="script.js"></script>
</body>
</html>
